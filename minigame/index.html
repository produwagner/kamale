<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kamale Games</title>
    <meta name="description" content="Kamale Games — Arcade retro no navegador. Snake, Pong, Block Game e Vea Game.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html, body { width:100%; height:100%; overflow:hidden; }
        body {
            background-color:#0a0a0a;
            color:#ffffff;
            font-family:'Share Tech Mono','Courier New',Courier,monospace;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            touch-action:none; position:fixed; inset:0;
            padding: 10px;
        }
        .header { display:flex; flex-direction:column; align-items:center; gap:4px; margin-bottom:clamp(6px,1.5vh,16px); user-select:none; }
        .header-logo { font-family:'Press Start 2P',monospace; font-size:clamp(0.85rem,4.5vw,1.4rem); font-weight:bold; color:#ffd100; letter-spacing:2px; }
        .header-sub { font-size:clamp(0.6rem,2.5vw,0.75rem); color:#777777; letter-spacing:2px; text-align:center; max-width:90vw; }
        
        #game-board {
            position: relative;
            aspect-ratio: 1 / 1;
            width: min(90vw, 72vh, 420px);
            border: 3px dashed rgba(255, 209, 0, 0.4);
            border-radius: 20px;
            background-color: #050505;
            box-shadow: 0 0 20px rgba(255, 208, 0, 0.05);
            overflow: hidden;
            padding: clamp(8px, 2vw, 15px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(6px, 1.2vw, 10px);
        }

        /* ═══ APOIE BUTTON ═══ */
        a.apoie-btn {
            text-decoration: none;
            color: inherit;
        }
        .apoie-btn {
            height: 30px;
            padding: 0 10px;
            border-radius: 9999px;
            background-color: #7dd3a8;
            border: 2px solid #5ebd90;
            color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            outline: none;
            box-shadow: 0 4px 0 #3a9a6a;
            transform: translateY(-3px);
            transition: background-color 0.1s, transform 0.1s, border-color 0.1s, box-shadow 0.1s;
            user-select: none;
            flex-shrink: 0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .apoie-btn:hover { background-color: #8ee5b8; }
        .apoie-btn.focused {
            background-color: #ffd100;
            border-color: #cca700;
            color: #000000;
            box-shadow: 0 0 15px rgba(255,209,0,0.5), 0 4px 0 #cca700;
            animation: apoiePulse 1s ease-in-out infinite;
        }
        @keyframes apoiePulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255,209,0,0.5), 0 4px 0 #cca700; }
            50% { box-shadow: 0 0 25px rgba(255,209,0,0.8), 0 4px 0 #cca700; }
        }
        .apoie-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #3a9a6a; }

        /* ═══ GOOGLE LOGIN ═══ */
        .google-login-btn {
            position: relative;
            height: 30px;
            min-width: 100px;
            padding: 0 12px;
            border-radius: 9999px;
            background-color: #282828;
            border: 2px solid #444444;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            outline: none;
            box-shadow: 0 4px 0 #141414;
            transform: translateY(-3px);
            transition: opacity 0.3s ease;
            user-select: none;
            flex-shrink: 0;
            margin-left: auto;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
        }
        .google-login-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            background: linear-gradient(90deg, #333 25%, #444 50%, #333 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.2s infinite;
        }
        .google-login-btn.loaded::after { display: none; }
        @keyframes skeleton-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .google-login-btn svg { flex-shrink: 0; }
        .google-login-btn:hover,
        .google-login-btn.focused {
            background-color: #353535;
            border-color: #ffd100;
        }
        .google-login-btn:active {
            transform: translateY(1px);
            box-shadow: 0 1px 0 #141414;
        }

        /* ═══ GAMES GRID ═══ */
        .games-grid {
            display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr;
            gap:clamp(6px,1.2vw,12px);
            width:100%;
            flex:1;
            min-height:0;
        }
        .game-card {
            position:relative; border:3px dashed #333333; border-radius:14px;
            background-color:#0a0a0a; text-decoration:none; color:inherit;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            gap:clamp(2px,0.6vh,6px); padding:6px; overflow:hidden;
            transition:border-color 0.2s ease, transform 0.15s ease, background-color 0.2s ease; cursor:pointer;
        }
        .game-card:hover, .game-card.focused { border-color:var(--accent); background-color:var(--glow); transform:scale(1.04); outline:none; }
        .game-card:active { transform:scale(0.97); }
        .card-pong  { --accent:#00c8ff; --glow:rgba(0,200,255,0.14); }
        .card-snake { --accent:#3acc7a; --glow:rgba(58,204,122,0.14); }
        .card-block { --accent:#bf00ff; --glow:rgba(191,0,255,0.14); }
        .card-velha { --accent:#ffd100; --glow:rgba(255,209,0,0.14); }
        .card-preview { flex:1; width:100%; display:flex; align-items:center; justify-content:center; min-height:0; }
        .card-label { font-size:clamp(0.5rem,2.2vw,0.68rem); font-weight:bold; color:#bbbbbb; letter-spacing:2px; text-align:center; transition:color 0.2s; }
        .game-card:hover .card-label, .game-card.focused .card-label { color:var(--accent); }

        .card-preview-img { width:100%; height:100%; object-fit:contain; border-radius:10px; }

        /* ═══ CONTROLES MÓVEIS ═══ */
        #controls-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: min(95vw, 320px);
            margin-top: clamp(8px, 1.5vh, 14px);
            user-select: none;
            z-index: 15;
        }

        #dpad-container {
            display: grid;
            grid-template-areas: ". up ." "left center right" ". down .";
            grid-template-columns: repeat(3, 38px);
            grid-template-rows: repeat(3, 38px);
            gap: 5px;
        }

        #action-buttons-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 90px;
            height: 90px;
        }

        .dpad-btn-wrapper.up { grid-area: up; }
        .dpad-btn-wrapper.left { grid-area: left; }
        .dpad-btn-wrapper.center { grid-area: center; }
        .dpad-btn-wrapper.right { grid-area: right; }
        .dpad-btn-wrapper.down { grid-area: down; }

        .dpad-btn {
            width: 100%;
            height: 100%;
            background-color: #282828;
            border: 2px solid #444444;
            color: #888888;
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            outline: none;
            box-shadow: 0 4px 0 #141414;
            transform: translateY(-3px);
            transition: background-color 0.1s, transform 0.1s, border-color 0.1s, box-shadow 0.1s, color 0.1s;
            border-radius: 9px;
            font-weight: bold;
        }

        .action-btn {
            width: 100%;
            height: 100%;
            background-color: #282828;
            border: 2px solid #444444;
            border-radius: 50%;
            cursor: pointer;
            outline: none;
            box-shadow: 0 5px 0 #141414;
            transform: translateY(-4px);
            transition: background-color 0.1s, transform 0.1s, border-color 0.1s, box-shadow 0.1s, color 0.1s;
            color: #888888;
            font-size: 1.25rem;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
        }

        .dpad-btn:active, .dpad-btn.active,
        .action-btn:active, .action-btn.active {
            background-color: #ffd100;
            border-color: #cca700;
            color: #000000;
            transform: translateY(1px);
            box-shadow: 0 1px 0 #cca700;
        }

        .action-btn.action-a {
            width: 54px;
            height: 54px;
        }

        .dpad-center-dot {
            width: 8px;
            height: 8px;
            background-color: #262626;
            border-radius: 50%;
            margin: auto;
        }

        .dpad-btn-wrapper.center {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .footer { margin-top:clamp(6px,1.2vh,12px); font-size:clamp(0.45rem,1.8vw,0.55rem); color:#555555; letter-spacing:2px; user-select:none; }

        /* ═══ RESPONSIVIDADE ═══ */
        @media (max-width:420px) {
            #game-board { width:95vw; height:auto; max-height:80vh; }
        }
        @media (max-height:560px) {
            .header { margin-bottom:4px; }
            .header-sub { display:none; }
            .footer { margin-top:4px; }
            #game-board { width:min(90vw, 70vh, 400px); }
        }
        @media (orientation:landscape) and (max-height:500px) {
            body { padding:4px; }
            .header { margin-bottom:2px; gap:2px; }
            .header-sub { display:none; }
            #game-board { width:min(85vw, 75vh, 380px); padding:6px; gap:4px; }
            #controls-wrapper { margin-top:4px; }
            .footer { margin-top:2px; }
        }
        @media (min-width: 769px) {
            #controls-wrapper { display: none !important; }
        }

        /* ═══ GIFT MODAL ═══ */
        .gift-overlay {
            position: fixed; inset: 0; z-index: 5000;
            background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center;
        }
        .gift-overlay.show { display: flex; }
        .gift-card {
            background: #111; border: 2px dashed rgba(255,209,0,0.4); border-radius: 18px;
            padding: 30px 24px; display: flex; flex-direction: column; align-items: center;
            gap: 18px; max-width: 320px; width: 90vw;
            box-shadow: 0 0 40px rgba(255,209,0,0.15);
            animation: giftAppear 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes giftAppear {
            from { opacity: 0; transform: scale(0.7) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .gift-title {
            font-family: 'Press Start 2P', monospace; font-size: 0.7rem;
            color: #ffd100; text-align: center; line-height: 1.6;
        }
        .gift-box-area {
            position: relative; width: 120px; height: 120px;
            cursor: pointer; user-select: none;
        }
        .gift-box {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
        }
        .gift-box.opened { transform: scale(0.5); opacity: 0; pointer-events: none; }
        .gift-box-svg { width: 100px; height: 100px; filter: drop-shadow(0 4px 12px rgba(255,209,0,0.3)); }
        .gift-ball {
            position: absolute; top: 50%; left: 50%;
            width: 0; height: 0; opacity: 0;
            transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1);
        }
        .gift-ball.pop {
            width: 80px; height: 80px; margin: -40px 0 0 -40px;
            opacity: 1; animation: ballBounce 0.6s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes ballBounce {
            0% { transform: scale(0) rotate(-180deg); }
            60% { transform: scale(1.15) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .gift-ball-svg { width: 100%; height: 100%; }
        .gift-actions {
            display: none; gap: 12px; width: 100%;
        }
        .gift-actions.show { display: flex; }
        .gift-btn {
            flex: 1; padding: 12px 0; border-radius: 10px;
            font-family: 'Press Start 2P', monospace; font-size: 0.55rem;
            cursor: pointer; border: none; transition: all 0.15s;
        }
        .gift-btn-activate {
            background: #3acc7a; color: #fff;
            box-shadow: 0 4px 0 #1e8a50;
        }
        .gift-btn-activate:hover { background: #4ddb8b; }
        .gift-btn-activate:active { transform: translateY(2px); box-shadow: 0 1px 0 #1e8a50; }
        .gift-btn-cancel {
            background: #444; color: #ccc; border: 1px solid #666;
            box-shadow: 0 4px 0 #222;
        }
        .gift-btn-cancel:hover { background: #555; color: #fff; }
        .gift-btn-cancel:active { transform: translateY(2px); box-shadow: 0 1px 0 #222; }
        .gift-hint {
            font-size: 0.65rem; color: #888; text-align: center;
        }
        .gift-hint.pop { display: none; }
        .gift-desc {
            font-size: 0.75rem; color: #aaa; text-align: center; line-height: 1.5;
            display: none;
        }
        .gift-desc.show { display: block; }

        /* ═══ TOAST ═══ */
        #toastContainer .toast {
            padding: 10px 20px; border-radius: 10px;
            font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; font-weight: bold;
            color: #333; background-color: #fff; border: 1px solid #ddd;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            opacity: 0; transform: translateY(-20px);
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            pointer-events: auto; white-space: nowrap;
        }
        #toastContainer .toast.show { opacity: 1; transform: translateY(0); }
        #toastContainer .toast.hide { opacity: 0; transform: translateY(-20px); }
        #toastContainer .toast.toast-success { border-color: #3acc7a; background-color: #eafaf1; color: #2ea862; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo">KAMALE<span style="color:#ffffff">MINI</span>GAME</div>
    <div class="header-sub">Passe o tempo e divirta-se com seus amigos</div>
</div>

        <a href="veagame/index.html" class="game-card card-velha" id="card-velha" aria-label="Jogar Vea Game">

<!-- ═══ GIFT MODAL ═══ -->

</div>

<!-- ═══ TOAST ═══ -->
<div id="toastContainer" style="position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;"></div>
<div id="controls-wrapper">
    <div id="dpad-container">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>

<script>
    // ═══ TOAST ═══
    function showToast(message, type = 'info', duration = 3000) {
        const container = document.getElementById('toastContainer');
        if (!container) return;
        const toast = document.createElement('div');
        toast.className = 'toast toast-' + type;
        toast.textContent = message;
        container.appendChild(toast);
        requestAnimationFrame(() => { toast.classList.add('show'); });
        setTimeout(() => {
            toast.classList.remove('show');
            toast.classList.add('hide');
            setTimeout(() => toast.remove(), 300);
        }, duration);
    }

    // ═══ GIFT MODAL ═══
    function checkGiftModal() {
        const params = new URLSearchParams(window.location.search);
        if (params.get('gift') === 'pending') {
            showGiftModal();
            window.history.replaceState({}, '', 'index.html');
        }
    }

    function showGiftModal() {
        const overlay = document.getElementById('giftOverlay');
        const boxArea = document.getElementById('giftBoxArea');
        const box = document.getElementById('giftBox');
        const ball = document.getElementById('giftBall');
        const hint = document.getElementById('giftHint');
        const desc = document.getElementById('giftDesc');
        const actions = document.getElementById('giftActions');
        const activateBtn = document.getElementById('giftActivate');
        const cancelBtn = document.getElementById('giftCancel');

        overlay.classList.add('show');
        box.classList.remove('opened');
        ball.classList.remove('pop');
        hint.classList.remove('pop');
        desc.classList.remove('show');
        actions.classList.remove('show');

        let opened = false;

        boxArea.onclick = () => {
            if (opened) return;
            opened = true;
            box.classList.add('opened');
            setTimeout(() => {
                ball.classList.add('pop');
                hint.classList.add('pop');
                setTimeout(() => {
                    desc.classList.add('show');
                    actions.classList.add('show');
                }, 500);
            }, 250);
        };

        activateBtn.onclick = () => {
            localStorage.setItem('kamale_donor', 'true');
            overlay.classList.remove('show');
            showToast('Bola da Copa ativada! ⚽', 'success');
        };

        cancelBtn.onclick = () => {
            overlay.classList.remove('show');
        };
    }

    checkGiftModal();

    // ═══ NAVEGAÇÃO ═══
    const allItems = [
        document.getElementById('apoie-btn'),
        document.getElementById('google-login-btn'),
        document.getElementById('card-snake'),
        document.getElementById('card-pong'),
        document.getElementById('card-block'),
        document.getElementById('card-velha')
    ];
    let focusedIndex = 2;
    const ROWS = [[0, 1], [2, 3], [4, 5]];

    function findPos(idx) {
        for (let r = 0; r < ROWS.length; r++) {
            const c = ROWS[r].indexOf(idx);
            if (c !== -1) return { r, c };
        }
        return { r: 0, c: 0 };
    }

    function updateFocus() {
        allItems.forEach((item, idx) => {
            if (idx === focusedIndex) {
                item.classList.add('focused');
                item.focus();
            } else {
                item.classList.remove('focused');
            }
        });
    }

    allItems.forEach((item, idx) => {
        item.addEventListener('mouseenter', () => {
            focusedIndex = idx;
            updateFocus();
        });
    });

    function moveFocus(dr, dc) {
        const { r, c } = findPos(focusedIndex);
        let nr = r + dr;
        const totalRows = ROWS.length;

        // Wrap-around vertical
        if (nr < 0) nr = totalRows - 1;
        if (nr >= totalRows) nr = 0;

        const row = ROWS[nr];
        let nc = dc === 0 ? c : c + dc;

        // Wrap-around horizontal
        if (nc < 0) nc = row.length - 1;
        if (nc >= row.length) nc = 0;

        focusedIndex = row[nc];
        updateFocus();
    }

    function setupButton(btn, action) {
        if (!btn) return;
        const press = (e) => {
            e.preventDefault();
            btn.classList.add('active');
            action();
        };
        const release = () => btn.classList.remove('active');
        btn.addEventListener('touchstart', press, { passive: false });
        btn.addEventListener('touchend', release, { passive: true });
        btn.addEventListener('touchcancel', release, { passive: true });
        btn.addEventListener('mousedown', press);
        btn.addEventListener('mouseup', release);
        btn.addEventListener('mouseleave', release);
    }

    setupButton(document.getElementById('dpad-up'), () => moveFocus(-1, 0));
    setupButton(document.getElementById('dpad-down'), () => moveFocus(1, 0));
    setupButton(document.getElementById('dpad-left'), () => moveFocus(0, -1));
    setupButton(document.getElementById('dpad-right'), () => moveFocus(0, 1));
    setupButton(document.getElementById('action-a'), () => {
        const item = allItems[focusedIndex];
        if (item.tagName === 'A') {
            window.location.href = item.getAttribute('href');
        } else {
            item.click();
        }
    });

    window.addEventListener('keydown', (e) => {
        let handled = false;
        switch (e.key) {
            case 'ArrowUp': case 'w': case 'W':
                moveFocus(-1, 0);
                document.getElementById('dpad-up')?.classList.add('active');
                handled = true; break;
            case 'ArrowDown': case 's': case 'S':
                moveFocus(1, 0);
                document.getElementById('dpad-down')?.classList.add('active');
                handled = true; break;
            case 'ArrowLeft': case 'a': case 'A':
                moveFocus(0, -1);
                document.getElementById('dpad-left')?.classList.add('active');
                handled = true; break;
            case 'ArrowRight': case 'd': case 'D':
                moveFocus(0, 1);
                document.getElementById('dpad-right')?.classList.add('active');
                handled = true; break;
            case ' ': case 'Enter': case 'z': case 'Z': case 'x': case 'X':
                document.getElementById('action-a')?.classList.add('active');
                const item = allItems[focusedIndex];
                if (item.tagName === 'A') {
                    window.location.href = item.getAttribute('href');
                } else {
                    item.click();
                }
                handled = true; break;
        }
        if (handled) e.preventDefault();
    });

    window.addEventListener('keyup', (e) => {
        switch (e.key) {
            case 'ArrowUp': case 'w': case 'W': document.getElementById('dpad-up')?.classList.remove('active'); break;
            case 'ArrowDown': case 's': case 'S': document.getElementById('dpad-down')?.classList.remove('active'); break;
            case 'ArrowLeft': case 'a': case 'A': document.getElementById('dpad-left')?.classList.remove('active'); break;
            case 'ArrowRight': case 'd': case 'D': document.getElementById('dpad-right')?.classList.remove('active'); break;
            case ' ': case 'Enter': case 'z': case 'Z': case 'x': case 'X': document.getElementById('action-a')?.classList.remove('active'); break;
        }
    });

    updateFocus();
</script>

</body>
</html>
