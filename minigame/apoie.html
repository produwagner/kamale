<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Apoie o Kamale MiniGame</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Share Tech Mono', 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            align-self: flex-start;
            background: none;
            border: 2px solid #444;
            color: #888;
            padding: 6px 16px;
            border-radius: 9999px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            letter-spacing: 1px;
        }
        .back-btn:hover { color: #ffd100; border-color: #ffd100; background: rgba(255,209,0,0.06); }

        .card {
            width: 100%;
            background: rgba(255, 209, 0, 0.03);
            border: 3px dashed rgba(255, 209, 0, 0.25);
            border-radius: 20px;
            padding: clamp(20px, 4vw, 32px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .card-icon {
            width: 64px;
            height: 64px;
            border: 2px dashed rgba(255,209,0,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            background: rgba(255,209,0,0.05);
        }
        .card-icon img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .card-title {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(0.7rem, 3vw, 1rem);
            color: #ffd100;
            text-align: center;
            line-height: 1.5;
        }

        .card-desc {
            font-size: 0.75rem;
            color: #999;
            text-align: center;
            line-height: 1.5;
            max-width: 280px;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,209,0,0.2), transparent);
        }

        .amount-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .amount-label {
            font-size: 0.65rem;
            color: #ffd100;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .amount-options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .amount-btn {
            background-color: #111;
            border: 2px solid #333;
            color: #aaa;
            padding: 10px 0;
            border-radius: 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 3px 0 #1a1a1a;
            transform: translateY(-2px);
        }
        .amount-btn:hover {
            background-color: #1a1a1a;
            border-color: #ffd100;
            color: #ffd100;
            box-shadow: 0 3px 0 #886a00;
            transform: translateY(-1px) scale(1.02);
        }
        .amount-btn:active {
            transform: translateY(1px);
            box-shadow: 0 1px 0 #1a1a1a;
        }
        .amount-btn.selected {
            background-color: #ffd100;
            color: #0a0a0a;
            border-color: #ffd100;
            box-shadow: 0 3px 0 #886a00;
        }

        .pay-btn {
            width: 100%;
            background: #ffd100;
            border: none;
            padding: 12px 0;
            border-radius: 12px;
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(0.6rem, 2.5vw, 0.8rem);
            font-weight: bold;
            color: #0a0a0a;
            cursor: pointer;
            box-shadow: 0 4px 0 #b38f00;
            transform: translateY(-2px);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 1px;
        }
        .pay-btn:hover { background: #ffe44d; box-shadow: 0 4px 0 #cca700; }
        .pay-btn:active {
            transform: translateY(1px);
            box-shadow: 0 1px 0 #b38f00;
        }

        .secure-text {
            font-size: 0.6rem;
            color: #666;
            text-align: center;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            padding: 10px 20px;
            border-radius: 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            font-weight: bold;
            color: #333;
            background-color: #ffffff;
            border: 1px solid #ddd;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.hide { opacity: 0; transform: translateY(-20px); }
        .toast.toast-success { border-color: #ffd100; background-color: #1a1a0a; color: #ffd100; }
        .toast.toast-info { border-color: #444; background-color: #111; color: #ccc; }

        @media (min-width: 769px) {
            .container { max-width: 420px; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <a href="index.html" class="back-btn">← VOLTAR</a>

        <div class="card">
            <div class="card-icon">
                <img src="assets/shared/logo1.png" alt="Kamale Logo">
            </div>
            <div class="card-title">APOIE O KAMALE MINIGAME</div>
            <div class="card-desc">
                Ajude-nos a manter os jogos gratuitos e sempre melhorando.
                Sua contribuição faz a diferença!
            </div>

            <div class="divider"></div>

            <div class="amount-section">
                <div class="amount-label">ESCOLHA O VALOR:</div>
                <div class="amount-options">
                    <button class="amount-btn" data-value="5">R$ 5</button>
                    <button class="amount-btn selected" data-value="10">R$ 10</button>
                    <button class="amount-btn" data-value="20">R$ 20</button>
                    <button class="amount-btn" data-value="50">R$ 50</button>
                </div>
            </div>

            <div class="divider"></div>

            <button class="pay-btn" id="payBtn">
                APOIAR ❤️
            </button>

            <div class="secure-text">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="#666">
                    <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                </svg>
                PAGAMENTO SEGURO E CRIPTOGRAFADO
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        function showToast(message, type = 'info', duration = 3000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            container.appendChild(toast);
            requestAnimationFrame(() => { toast.classList.add('show'); });
            setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        const amountBtns = document.querySelectorAll('.amount-btn');
        let selectedAmount = 10;

        amountBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                amountBtns.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedAmount = parseInt(btn.dataset.value);
            });
        });

        document.getElementById('payBtn').addEventListener('click', () => {
            if (selectedAmount <= 0 || isNaN(selectedAmount)) {
                showToast('Selecione um valor válido', 'info');
                return;
            }
            var user = window.KamaleAuth ? window.KamaleAuth.getUser() : firebase.auth().currentUser;
            if (!user) {
                showToast('Faça login para apoiar', 'info');
                return;
            }
            firebase.database().ref('supporters/' + user.uid).set({
                name: user.displayName || '',
                email: user.email || '',
                amount: selectedAmount,
                date: new Date().toISOString()
            }).then(() => {
                showToast('Obrigado pelo apoio! Você ganhou um presente surpresa!', 'success', 2500);
                setTimeout(() => {
                    window.location.href = 'index.html?gift=pending';
                }, 1500);
            });
        });
    </script>
</body>
</html>
